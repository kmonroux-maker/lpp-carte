<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LPP — Carte Revendeurs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --rose:       #c47c7c;
      --rose-light: #f7eded;
      --rose-mid:   #e8c5c5;
      --cream:      #faf8f5;
      --white:      #ffffff;
      --text:       #2c2420;
      --muted:      #9a9088;
      --border:     #ede7e0;
      --border-lt:  #f5f0eb;
    }

    body { font-family: 'Nunito', sans-serif; display: flex; height: 100vh; overflow: hidden; color: var(--text); }

    /* ═══ SIDEBAR ═══ */
    #sidebar {
      width: 300px; flex-shrink: 0;
      background: var(--white); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }

    .lpp-header { padding: 18px 18px 14px; border-bottom: 1px solid var(--border-lt); }
    .lpp-brand { font-family: 'Cormorant Garamond', serif; font-size: 19px; font-weight: 600; color: var(--rose); }
    .lpp-brand em { font-style: italic; font-weight: 400; font-size: 17px; }
    .lpp-tag { font-size: 10px; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.7px; }

    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 10px 14px; border-bottom: 1px solid var(--border-lt); }
    .stat { background: var(--cream); border-radius: 8px; padding: 7px 10px; }
    .stat-v { font-size: 17px; font-weight: 600; color: var(--rose); }
    .stat-l { font-size: 10px; color: var(--muted); margin-top: 1px; text-transform: uppercase; letter-spacing: 0.4px; }

    .srch-wrap { padding: 9px 14px; border-bottom: 1px solid var(--border-lt); }
    #search {
      width: 100%; padding: 7px 12px;
      border: 1px solid var(--border); border-radius: 20px;
      font-family: 'Nunito', sans-serif; font-size: 13px;
      background: var(--cream); color: var(--text); outline: none;
    }
    #search::placeholder { color: var(--muted); }
    #search:focus { border-color: var(--rose-mid); }

    .sort-wrap { padding: 7px 14px; border-bottom: 1px solid var(--border-lt); display: flex; gap: 5px; }
    .sort-btn {
      font-family: 'Nunito', sans-serif; font-size: 11px; padding: 3px 9px;
      border-radius: 12px; border: 1px solid var(--border);
      background: transparent; cursor: pointer; color: var(--muted); transition: all .12s;
    }
    .sort-btn:hover { border-color: var(--rose-mid); color: var(--rose); }
    .sort-btn.on { background: var(--rose); color: white; border-color: var(--rose); }

    #list { flex: 1; overflow-y: auto; padding: 4px 0; }
    #list::-webkit-scrollbar { width: 3px; }
    #list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .item { padding: 9px 14px; cursor: pointer; border-left: 2px solid transparent; transition: background .1s; }
    .item:hover { background: var(--cream); }
    .item.sel { background: var(--rose-light); border-left-color: var(--rose); }
    .item-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .item-loc  { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .item-meta { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
    .m-cmd { font-size: 11px; font-weight: 600; color: var(--rose); }
    .m-amt { font-size: 11px; color: var(--muted); }
    .bdg { margin-left: auto; font-size: 10px; padding: 1px 7px; border-radius: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .3px; }
    .bdg-actif    { background: #edf7ee; color: #2d6a30; }
    .bdg-inactif  { background: #f3f3f3; color: #999; }
    .bdg-prospect { background: #fff8e6; color: #a06b00; }
    .empty { padding: 28px 18px; text-align: center; color: var(--muted); font-size: 13px; line-height: 1.7; }

    .rt-bar { padding: 8px 14px; border-top: 1px solid var(--border-lt); display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--muted); }
    .rt-dot { width: 7px; height: 7px; border-radius: 50%; background: #4caf50; flex-shrink: 0; animation: pulse 2.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ═══ MAP ═══ */
    #map { flex: 1; }

    .leaflet-popup-content-wrapper {
      border-radius: 10px !important; box-shadow: 0 4px 24px rgba(0,0,0,.09) !important;
      border: 1px solid var(--border) !important; font-family: 'Nunito', sans-serif;
    }
    .leaflet-popup-tip { background: white !important; }
    .pp { padding: 2px 0; min-width: 185px; }
    .pp-name { font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .pp-addr { font-size: 11px; color: var(--muted); margin-bottom: 8px; line-height: 1.4; }
    .pp-hr   { border: none; border-top: 1px solid var(--border-lt); margin: 6px 0; }
    .pp-row  { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 3px; }
    .pp-k    { color: var(--muted); }
    .pp-v    { font-weight: 600; color: var(--text); }
  </style>
</head>
<body>

<div id="sidebar">
  <div class="lpp-header">
    <div class="lpp-brand">Luciole <em>&amp;</em> Petit Pois</div>
    <div class="lpp-tag">Carte revendeurs</div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-v" id="s-tot">—</div><div class="stat-l">Revendeurs</div></div>
    <div class="stat"><div class="stat-v" id="s-act">—</div><div class="stat-l">Actifs</div></div>
    <div class="stat"><div class="stat-v" id="s-ca">—</div><div class="stat-l">Chiffre d'affaires</div></div>
    <div class="stat"><div class="stat-v" id="s-cmd">—</div><div class="stat-l">Commandes</div></div>
  </div>
  <div class="srch-wrap">
    <input type="text" id="search" placeholder="Rechercher un revendeur…" oninput="window.LPP.renderList()">
  </div>
  <div class="sort-wrap">
    <button class="sort-btn on" data-s="cmd"   onclick="window.LPP.setSort(this)">Commandes</button>
    <button class="sort-btn"   data-s="ca"     onclick="window.LPP.setSort(this)">Montant</button>
    <button class="sort-btn"   data-s="name"   onclick="window.LPP.setSort(this)">Nom A–Z</button>
    <button class="sort-btn"   data-s="recent" onclick="window.LPP.setSort(this)">Récents</button>
  </div>
  <div id="list"><div class="empty">Connexion à Supabase…</div></div>
  <div class="rt-bar"><div class="rt-dot"></div>Temps réel actif</div>
</div>

<div id="map"></div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

// ┌──────────────────────────────────────────────────────────────┐
// │  CONFIGURATION — remplacer les deux valeurs ci-dessous       │
// │  Supabase → Settings → API                                   │
// └──────────────────────────────────────────────────────────────┘
const SUPABASE_URL = 'https://adrubejmmdxrobinmgxx.supabase.co/rest/v1/'   // ex: https://abcdef.supabase.co
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkcnViZWptbWR4cm9iaW5tZ3h4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NDUxODYsImV4cCI6MjA5NDQyMTE4Nn0.ZKZoiOTZszQijt3i5uT3nUz_2U38-KA82pbBmR5KlR0'       // commence par eyJh...
// ────────────────────────────────────────────────────────────────

if (SUPABASE_URL === 'https://adrubejmmdxrobinmgxx.supabase.co/rest/v1/') {
  document.getElementById('list').innerHTML =
    '<div class="empty" style="color:var(--rose)"><strong>Configuration manquante.</strong><br><br>' +
    'Ouvrez ce fichier dans le Bloc-notes (clic droit → Ouvrir avec → Bloc-notes) ' +
    'et remplacez VOTRE_URL_SUPABASE et VOTRE_CLE_ANON par vos clés Supabase.<br><br>' +
    '(Supabase → Settings → API)</div>'
}

const db  = createClient(SUPABASE_URL, SUPABASE_KEY)
const map = L.map('map', { center: [46.5, 3.0], zoom: 6 })

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/attributions">CARTO</a>',
  maxZoom: 19
}).addTo(map)

let rows = [], markers = {}, activeId = null, sortKey = 'cmd'

function mkIcon(r) {
  const n = r.nb_commandes || 1
  const size = Math.max(20, Math.min(36, 18 + n * 3))
  const bg = r.statut === 'Inactif' ? '#bbb' : r.statut === 'Prospect' ? '#d4a843' : '#c47c7c'
  const fs = Math.max(9, Math.round(size * 0.38))
  return L.divIcon({
    className: '',
    html: `<div style="width:${size}px;height:${size}px;background:${bg};border:2.5px solid white;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,.18);display:flex;align-items:center;justify-content:center;font-family:Nunito,sans-serif;font-size:${fs}px;font-weight:700;color:white">${n}</div>`,
    iconSize: [size, size], iconAnchor: [size/2, size/2], popupAnchor: [0, -(size/2+4)]
  })
}

function mkPopup(r) {
  const date = r.date_derniere_commande
    ? new Date(r.date_derniere_commande).toLocaleDateString('fr-FR', {day:'2-digit',month:'long',year:'numeric'})
    : '—'
  const ca = (r.montant_total||0).toLocaleString('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0})
  return `<div class="pp">
    <div class="pp-name">${r.store_name||'—'}</div>
    <div class="pp-addr">${r.adresse||'—'}</div>
    <hr class="pp-hr">
    <div class="pp-row"><span class="pp-k">Commandes</span><span class="pp-v">${r.nb_commandes||0}</span></div>
    <div class="pp-row"><span class="pp-k">Chiffre d'affaires</span><span class="pp-v">${ca}</span></div>
    <div class="pp-row"><span class="pp-k">Dernière commande</span><span class="pp-v">${date}</span></div>
    <div class="pp-row"><span class="pp-k">Email</span><span class="pp-v" style="font-size:11px;word-break:break-all">${r.email||'—'}</span></div>
  </div>`
}

function upsertMarker(r) {
  if (!r.latitude || !r.longitude) return
  if (markers[r.id]) map.removeLayer(markers[r.id])
  const m = L.marker([r.latitude, r.longitude], {icon: mkIcon(r)})
    .addTo(map).bindPopup(mkPopup(r), {maxWidth: 240})
  m.on('click', () => activate(r.id, false))
  markers[r.id] = m
}

function updateStats() {
  document.getElementById('s-tot').textContent = rows.length
  document.getElementById('s-act').textContent = rows.filter(r => r.statut==='Actif').length
  const ca  = rows.reduce((s,r) => s+(r.montant_total||0), 0)
  const cmd = rows.reduce((s,r) => s+(r.nb_commandes||0), 0)
  document.getElementById('s-ca').textContent  = ca  >= 1000 ? (ca/1000).toFixed(1)+'k €' : ca.toFixed(0)+' €'
  document.getElementById('s-cmd').textContent = cmd
}

function renderList() {
  const q = (document.getElementById('search').value||'').toLowerCase()
  let list = rows.filter(r =>
    !q || (r.store_name||'').toLowerCase().includes(q) ||
          (r.adresse||'').toLowerCase().includes(q) ||
          (r.pays||'').toLowerCase().includes(q))
  if (sortKey==='cmd')    list.sort((a,b)=>(b.nb_commandes||0)-(a.nb_commandes||0))
  if (sortKey==='ca')     list.sort((a,b)=>(b.montant_total||0)-(a.montant_total||0))
  if (sortKey==='name')   list.sort((a,b)=>(a.store_name||'').localeCompare(b.store_name||''))
  if (sortKey==='recent') list.sort((a,b)=>new Date(b.date_derniere_commande||0)-new Date(a.date_derniere_commande||0))
  if (!list.length) { document.getElementById('list').innerHTML='<div class="empty">Aucun résultat</div>'; return }
  const city = r => { const p=(r.adresse||'').split(','); return p.length>1?p[p.length-1].trim():(r.pays||'—') }
  const fmt  = n  => (n||0).toLocaleString('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0})
  const bdg  = st => ({Actif:'bdg-actif',Inactif:'bdg-inactif',Prospect:'bdg-prospect'})[st]||'bdg-actif'
  document.getElementById('list').innerHTML = list.map(r=>`
    <div class="item${r.id===activeId?' sel':''}" onclick="window.LPP.activate('${r.id}',true)">
      <div class="item-name">${r.store_name||'—'}</div>
      <div class="item-loc">${city(r)}</div>
      <div class="item-meta">
        <span class="m-cmd">${r.nb_commandes||0} cmd</span>
        <span class="m-amt">${fmt(r.montant_total)}</span>
        <span class="bdg ${bdg(r.statut)}">${r.statut||'Actif'}</span>
      </div>
    </div>`).join('')
}

function activate(id, panTo) {
  activeId = id
  const r = rows.find(x=>x.id===id)
  if (r && markers[id]) {
    if (panTo) map.setView([r.latitude, r.longitude], 12, {animate:true})
    markers[id].openPopup()
  }
  renderList()
}

function setSort(btn) {
  sortKey = btn.dataset.s
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('on'))
  btn.classList.add('on')
  renderList()
}

async function loadData() {
  const {data, error} = await db.from('revendeurs').select('*').order('nb_commandes',{ascending:false})
  if (error) {
    document.getElementById('list').innerHTML=
      `<div class="empty" style="color:var(--rose)">Erreur : ${error.message}<br><br>Vérifiez vos clés Supabase.</div>`
    return
  }
  rows = data || []
  rows.forEach(upsertMarker)
  updateStats()
  renderList()
}

db.channel('lpp-live')
  .on('postgres_changes', {event:'*',schema:'public',table:'revendeurs'}, p => {
    if      (p.eventType==='INSERT') { rows.push(p.new); upsertMarker(p.new) }
    else if (p.eventType==='UPDATE') { const i=rows.findIndex(r=>r.id===p.new.id); if(i>=0) rows[i]=p.new; upsertMarker(p.new) }
    else if (p.eventType==='DELETE') { rows=rows.filter(r=>r.id!==p.old.id); if(markers[p.old.id]){map.removeLayer(markers[p.old.id]);delete markers[p.old.id]} }
    updateStats(); renderList()
  }).subscribe()

window.LPP = { renderList, setSort, activate }

if (SUPABASE_URL !== 'VOTRE_URL_SUPABASE') loadData()
</script>
</body>
</html>
